repos:
  # Poetry hooks for dependency management
  - repo: https://github.com/python-poetry/poetry
    rev: '1.8.4'
    hooks:
      - id: poetry-check
      - id: poetry-lock
        args: [--no-update]

  # Black for code formatting
  - repo: https://github.com/psf/black
    rev: '25.1.0'
    hooks:
      - id: black
        language_version: python3.11
        exclude: ^experiments/

  # Ruff for linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.2
    hooks:
      - id: ruff
        args: [--fix]   # optional: auto-fix issues like isort-style imports
        exclude: 'tests/.*|.*test.*\.py$|^experiments/'

  # MyPy for type checking
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: python scripts/run_mypy.py
        language: system
        types: [ python ]
        require_serial: true
        pass_filenames: true
        files: ^src/.*\.py$
        stages: [manual]

  # General pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-toml
